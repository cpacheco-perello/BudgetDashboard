directories:
  output: dist
  buildResources: assets
appId: com.tuempresa.dashboardeconomic
productName: DashboardEconomic
asar: true
compression: maximum
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: DashboardEconomic
files:
  - filter:
      - main.js
      - preload.js
      - public/**/*
      - src/**/*
      - node_modules/sqlite3/**/*
      - node_modules/yahoo-finance2/**/*
asarUnpack:
  - node_modules/sqlite3/**/*.node
extraMetadata:
  main: main.js
electronVersion: 40.1.0
