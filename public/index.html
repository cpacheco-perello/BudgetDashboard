<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://api.exchangerate-api.com https://query2.finance.yahoo.com https://cdn.jsdelivr.net; img-src 'self' data:;">
    <title data-i18n="app.tituloPagina">Dashboard Económico</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-layout">
    <aside class="sidebar" data-i18n-aria-label="nav.navegacionPrincipal" aria-label="Navegación principal">
        <nav class="sidebar-nav">
            <button class="tablink active" data-tab="inicio" data-i18n-title="nav.inicio" data-i18n-aria-label="nav.inicio" title="Inicio" aria-label="Inicio"><i class="fas fa-house"></i></button>
            <button class="tablink" data-tab="dashboard" data-i18n-title="nav.dashboard" data-i18n-aria-label="nav.dashboard" title="Dashboard" aria-label="Dashboard"><i class="fas fa-tachometer-alt"></i></button>
            <button class="tablink" data-tab="categorias" data-i18n-title="nav.categorias" data-i18n-aria-label="nav.categorias" title="Categorías" aria-label="Categorías"><i class="fas fa-tag"></i></button>
            <button class="tablink" data-tab="gastos" data-i18n-title="nav.gastos" data-i18n-aria-label="nav.gastos" title="Gastos" aria-label="Gastos"><i class="fas fa-credit-card"></i></button>
            <button class="tablink" data-tab="ingresos" data-i18n-title="nav.ingresos" data-i18n-aria-label="nav.ingresos" title="Ingresos" aria-label="Ingresos"><i class="fas fa-money-bill"></i></button>
            <button class="tablink" data-tab="impuestos" data-i18n-title="nav.impuestos" data-i18n-aria-label="nav.impuestos" title="Impuestos" aria-label="Impuestos"><i class="fas fa-receipt"></i></button>
            <button class="tablink" data-tab="importacionBancaria" data-i18n-title="nav.importarBanco" data-i18n-aria-label="nav.importarBanco" title="Importar Banco" aria-label="Importar Banco"><i class="fas fa-file-import"></i></button>
            <button class="tablink" data-tab="hucha" data-i18n-title="nav.hucha" data-i18n-aria-label="nav.hucha" title="Hucha Real" aria-label="Hucha Real"><i class="fas fa-piggy-bank"></i></button>
        </nav>

        <div class="sidebar-bottom">
            <button class="tablink" data-tab="ajustes" data-i18n-title="nav.ajustes" data-i18n-aria-label="nav.ajustes" title="Ajustes" aria-label="Ajustes"><i class="fas fa-sliders-h"></i></button>
            <button id="changeUserBtn" class="sidebar-user-btn" type="button" data-i18n-title="nav.usuario" data-i18n-aria-label="nav.usuario" title="Usuario" aria-label="Usuario">
                <i class="fas fa-user"></i>
            </button>
        </div>
    </aside>

    <div class="app-body">
        <main id="tab-content"></main>
    </div>
</div>

<!-- Selector de usuarios -->
<div id="userOverlay" class="user-overlay hidden">
    <div class="user-card">
        <h2 data-i18n="usuarios.seleccionaUsuario">Selecciona usuario</h2>
        <div class="user-row">
            <label for="userSelect" data-i18n="usuarios.usuarios">Usuarios</label>
            <select id="userSelect"></select>
            <button id="userSelectBtn" class="btn-primary" type="button" data-i18n="usuarios.entrar">Entrar</button>
        </div>
        <div class="user-row">
            <label for="userIconSelect" data-i18n="usuarios.icono">Icono</label>
            <select id="userIconSelect"></select>
            <span id="userIconPreview" class="user-icon-preview">
                <i class="fas fa-user"></i>
            </span>
        </div>
        <div class="user-divider" data-i18n="usuarios.o">o</div>
        <div class="user-row">
            <label for="newUserName" data-i18n="usuarios.nuevoUsuario">Nuevo usuario</label>
            <input id="newUserName" type="text" data-i18n-placeholder="usuarios.placeholderNombre" placeholder="Nombre" />
            <button id="userCreateBtn" class="btn-success" type="button" data-i18n="usuarios.crear">Crear</button>
        </div>
        <div class="user-actions">
            <button id="userRefreshBtn" class="btn-secondary" type="button" data-i18n="usuarios.refrescar">Refrescar</button>
        </div>
    </div>
</div>

<!-- Sistema de modales personalizados -->
<div id="customModal" class="custom-modal">
    <div class="custom-modal-content">
        <div class="custom-modal-header">
            <h3 id="customModalTitle"></h3>
        </div>
        <div class="custom-modal-body">
            <p id="customModalMessage"></p>
        </div>
        <div class="custom-modal-footer">
            <button id="customModalConfirm" class="modal-btn modal-btn-confirm">Aceptar</button>
            <button id="customModalCancel" class="modal-btn modal-btn-cancel" style="display:none;">Cancelar</button>
        </div>
    </div>
</div>

<!-- ⚠️ ORDEN CORRECTO DE SCRIPTS ⚠️ -->
<!-- 1. Primero: Traducciones (todos los idiomas) -->
<script src="idiomas/es.js"></script>
<script src="idiomas/en.js"></script>
<script src="idiomas/pt.js"></script>
<script src="idiomas/fr.js"></script>
<script src="idiomas/eu.js"></script>
<script src="idiomas/ca.js"></script>

<!-- 2. Segundo: Gestor de idiomas -->
<script src="idiomas/idiomas.js"></script>

<!-- 3. Tercero: Sistema de temas -->
<script src="Temas/temas.js"></script>

<!-- 4. API Adapter - Debe cargarse ANTES de cualquier código que use fetch -->
<script src="js/apiConfig.js"></script>

<!-- 5. Sistema de modales personalizados -->
<script src="js/customModal.js"></script>

<!-- 6. Cuarto: Clases base y utilidades -->
<script src="js/TransactionManager.js"></script>

<!-- 7. Quinto: Páginas/Pestañas -->
<script src="Pestañas/categorias.js"></script>
<script src="Pestañas/gastos.js"></script>
<script src="Pestañas/ingresos.js"></script>
<script src="Pestañas/dashboard.js"></script>
<script src="Pestañas/impuestos.js"></script>
<script src="Pestañas/hucha.js"></script>
<script src="Pestañas/importacionBancaria.js"></script>

<!-- Librería para leer Excel (local) -->
<script src="libs/xlsx.full.min.js"></script>

<!-- 6. Último: Main.js -->
<script src="main.js"></script>

</body>
</html>
