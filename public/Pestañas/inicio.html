<section class="inicio-tab inicio-landing">
    <div class="inicio-topbar">
        <div class="periodo-selector inicio-periodos">
            <button class="btn-periodo active" data-periodo="1mes" data-i18n="periodos.un_mes">1 Mes</button>
            <button class="btn-periodo" data-periodo="3meses" data-i18n="periodos.tres_meses">3 Meses</button>
            <button class="btn-periodo" data-periodo="6meses" data-i18n="periodos.seis_meses">6 Meses</button>
            <button class="btn-periodo" data-periodo="1año" data-i18n="periodos.un_anio">1 Año</button>
            <button class="btn-periodo" data-periodo="5años" data-i18n="periodos.cinco_anios">5 Años</button>
            <button class="btn-periodo" data-periodo="10años" data-i18n="periodos.diez_anios">10 Años</button>
            <button class="btn-periodo btn-periodo-futuro" data-periodo="proximo1mes" data-i18n="periodos.proximo_mes">Próximo mes</button>
            <button class="btn-periodo btn-periodo-futuro" data-periodo="proximos3meses" data-i18n="periodos.proximos_tres_meses">Próximos 3 meses</button>
            <button class="btn-periodo btn-periodo-futuro" data-periodo="proximos6meses" data-i18n="periodos.proximos_seis_meses">Próximos 6 meses</button>
            <button id="btn-refresh-resumen" class="btn-refresh" data-i18n-title="dashboard.refrescarResumen" title="Refrescar resumen">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>

    <div class="inicio-cards-grid">
        <article class="inicio-card inicio-card-dark">
            <p class="inicio-card-label" data-i18n="resumen.saldoDisponible">Saldo disponible</p>
            <div class="inicio-card-value" id="saldo">€0</div>
            <p class="inicio-card-note" id="inicio-note-saldo">—</p>
        </article>

        <article class="inicio-card inicio-card-green">
            <p class="inicio-card-label" data-i18n="resumen.totalIngresos">Total Ingresos</p>
            <div class="inicio-card-value" id="total-ingresos">€0</div>
            <p class="inicio-card-note" id="inicio-note-ingresos">—</p>
        </article>

        <article class="inicio-card inicio-card-red">
            <p class="inicio-card-label" data-i18n="resumen.totalGastos">Total Gastos</p>
            <div class="inicio-card-value" id="total-gastos">€0</div>
            <p class="inicio-card-note" id="inicio-note-gastos">—</p>
        </article>
    </div>

    <div class="inicio-mini-grid">
        <article class="inicio-mini-card">
            <p class="inicio-card-label" data-i18n="resumen.totalImpuestos">Impuestos</p>
            <div class="inicio-mini-value" id="total-taxes">€0</div>
            <p class="inicio-card-note inicio-mini-note" id="inicio-note-taxes"></p>
        </article>
        <article class="inicio-mini-card inicio-mini-card-gold">
            <p class="inicio-card-label" data-i18n="resumen.totalHucha">Total Hucha</p>
            <div class="inicio-mini-value" id="total-hucha">€0</div>
        </article>
        <article class="inicio-mini-card">
            <p class="inicio-card-label" data-i18n="resumen.portfolioRendimiento">Rendimiento</p>
            <div class="inicio-mini-value" id="portfolio-rendimiento">€0 (0%)</div>
        </article>
    </div>

    <div class="inicio-panels-grid">
        <section class="inicio-panel">
            <h3 data-i18n="inicio.evolucionMensual">Evolución mensual</h3>
            <p data-i18n="inicio.ingresosVsGastos">Ingresos vs Gastos</p>
            <canvas id="inicioEvolucionChart"></canvas>
        </section>

        <section class="inicio-panel">
            <h3 data-i18n="inicio.gastosPorCategoria">Gastos por categoría</h3>
            <p data-i18n="inicio.distribucionPeriodo">Distribución del período</p>
            <div id="inicioCategoriasList" class="inicio-categorias-list"></div>
        </section>
    </div>
</section>
