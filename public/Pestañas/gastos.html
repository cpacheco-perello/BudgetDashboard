<section id="gastos" class="tab" style="display:block;">
  <h2 data-i18n="nav.gastos">Administrar Gastos</h2>

  <!-- BOTONES SUBPESTAÑAS -->
  <div class="mb-15">
    <button id="tabGastosPuntualesBtn" class="subtab-btn" data-target="tabGastosPuntuales" data-i18n="gastos.puntuales">Gastos Puntuales</button>
    <button id="tabGastosMensualesBtn" class="subtab-btn" data-target="tabGastosMensuales" data-i18n="gastos.mensuales">Gastos Mensuales</button>
    <button id="tabGastosRealesBtn" class="subtab-btn" data-target="tabGastosReales" data-i18n="dashboard.gastosReales">Gastos Reales</button>
  </div>

  <!-- GASTOS PUNTUALES -->
  <div id="tabGastosPuntuales" class="subtab">
    <h3 data-i18n="gastos.puntuales">Gastos Puntuales</h3>
    <div class="mb-8">
      <button id="toggleGastosAntiguos" class="small-btn" data-i18n="gastos.mostrarAntiguos">Mostrar antiguos</button>
    </div>
    
    <table id="tablaGastosPuntuales">
      <thead>
        <tr>
          <th data-i18n="formularios.fecha">Fecha</th>
          <th data-i18n="formularios.descripcion">Descripción</th>
          <th data-i18n="formularios.monto">Monto</th>
          <th data-i18n="formularios.categoria">Categoría</th>
          <th class="w-120" data-i18n="tablas.acciones">Acciones</th>
        </tr>
        <tr class="insert-row">
          <td><input type="date" id="fechaGasto"></td>
          <td><input type="text" id="descGasto" data-i18n-placeholder="gastos.descripcion"></td>
          <td>
            <div class="input-euro flex-gap-8">
              <span>€</span>
              <input type="number" id="montoGasto" step="0.01" data-i18n-placeholder="formularios.placeholderMonto" style="width:100px;">
            </div>
            <div>
              <input type="checkbox" id="fraccionarGasto" style="cursor:pointer;">
              <input type="number" id="partesGasto" min="1" value="1" data-i18n-placeholder="formularios.placeholderNumeroPartes" class="display-none" style="width:60px;margin-left:6px;color:#000;background:#fff;padding:2px 4px;border:1px solid #ccc;" data-i18n-title="formularios.numeroPartes" title="Número de partes" aria-hidden="true">
            </div>
          </td>
          <td><select id="categoriaGasto"></select></td>
          <td><button id="btnAgregarGastoPuntual"><i class="fas fa-plus"></i></button></td>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- GASTOS MENSUALES -->
  <div id="tabGastosMensuales" class="subtab display-none">
    <h3 data-i18n="gastos.mensuales">Gastos Mensuales</h3>
    <div class="mb-8">
      <button id="toggleGastosMensualesAntiguos" class="small-btn" data-i18n="gastos.mostrarAntiguos">Mostrar antiguos</button>
    </div>
    <table id="tablaGastosMensuales">
      <thead>
        <tr>
          <th data-i18n="gastos.desde">Desde</th>
          <th data-i18n="gastos.hasta">Hasta</th>
          <th data-i18n="formularios.descripcion">Descripción</th>
          <th data-i18n="formularios.monto">Monto</th>
          <th data-i18n="gastos.ipc">IPC %</th>
          <th data-i18n="gastos.montoAjustado">Monto ajustado</th>
          <th data-i18n="formularios.categoria">Categoría</th>
          <th class="w-120" data-i18n="tablas.acciones">Acciones</th>
        </tr>
        <tr class="insert-row">
          <td>
            <input 
              type="text"
              id="desdeGasto"
              data-i18n-placeholder="formularios.placeholderYYYYMM"
              maxlength="7"
              pattern="\\d{4}-\\d{2}"
              data-i18n-title="formularios.formatoYYYYMM"
              title="Formato: YYYY-MM"
            >
          </td>
          <td>
            <input 
              type="text"
              id="hastaGasto"
              data-i18n-placeholder="formularios.placeholderYYYYMM"
              maxlength="7"
              pattern="\\d{4}-\\d{2}"
              data-i18n-title="formularios.formatoYYYYMM"
              title="Formato: YYYY-MM"
            >
          </td>
          <td><input type="text" id="descMensual" data-i18n-placeholder="gastos.descripcion"></td>
          <td>
            <div class="input-euro">
              <span>€</span>
              <input type="number" id="montoMensual" step="0.01" data-i18n-placeholder="formularios.placeholderMonto">
            </div>
          </td>
          <td>
            <input type="number" id="ipcMensual" step="0.01" min="0" data-i18n-placeholder="gastos.ipcPlaceholder" style="width:70px;">
          </td>
          <td>—</td>
          <td><select id="categoriaMensual"></select></td>
          <td><button id="btnAgregarMensual"><i class="fas fa-plus"></i></button></td>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- GASTOS REALES -->
  <div id="tabGastosReales" class="subtab display-none">
    <h3 data-i18n="dashboard.gastosReales">Gastos Reales</h3>
    <div class="mb-8">
      <button id="toggleGastosRealesAntiguos" class="small-btn" data-i18n="gastos.mostrarAntiguos">Mostrar antiguos</button>
    </div>

    <table id="tablaGastosReales">
      <thead>
        <tr>
          <th data-i18n="formularios.fecha">Fecha</th>
          <th data-i18n="formularios.descripcion">Descripción</th>
          <th data-i18n="formularios.monto">Monto</th>
          <th data-i18n="formularios.categoria">Categoría</th>
          <th class="w-120" data-i18n="tablas.acciones">Acciones</th>
        </tr>
        <tr class="insert-row">
          <td><input type="date" id="fechaGastoReal"></td>
          <td><input type="text" id="descGastoReal" data-i18n-placeholder="gastos.descripcion"></td>
          <td>
            <div class="input-euro flex-gap-8">
              <span>€</span>
              <input type="number" id="montoGastoReal" step="0.01" data-i18n-placeholder="formularios.placeholderMonto" style="width:100px;">
            </div>
          </td>
          <td><select id="categoriaGastoReal"></select></td>
          <td><button id="btnAgregarGastoReal"><i class="fas fa-plus"></i></button></td>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</section>
