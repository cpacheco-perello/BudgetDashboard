name: Release Windows EXE Only


on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Buscar el archivo .exe
        id: find_exe
        run: |
          $exe = Get-ChildItem -Path dist -Filter *.exe -Recurse | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($exe) {
            echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            echo "No se encontró el .exe en dist/"
            exit 1
          }

      - name: Crear release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_exe.outputs.exe_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
