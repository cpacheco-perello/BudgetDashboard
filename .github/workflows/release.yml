name: Release Windows EXE Only


on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump version in package.json from tag
        id: bump_version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          node -e "let pkg=require('./package.json');pkg.version='${TAG_VERSION}';require('fs').writeFileSync('package.json',JSON.stringify(pkg,null,2));"
          echo "Nueva versión en package.json: ${TAG_VERSION}"

      - name: Commit version bump
        run: |
          git config user.name cpacheco-perello
          git config user.email cpacheco.perello@outlook.com
          git add package.json
          git commit -m "chore: bump version to ${GITHUB_REF#refs/tags/v} [skip ci]"
          git push || echo "No se pudo hacer push (posiblemente por permisos en PRs de forks)"

      - name: Buscar el archivo .exe
        id: find_exe
        run: |
          $exe = Get-ChildItem -Path dist -Filter *.exe -Recurse | Select-Object -First 1
          if ($exe) {
            echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            echo "No se encontró el .exe en dist/"
            exit 1
          }

      - name: Crear release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_exe.outputs.exe_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
